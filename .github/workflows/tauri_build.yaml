name: "publish"
on:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
    - uses: actions/checkout@v2
    
    - name: setup node
      uses: actions/setup-node@v1
      with:
        node-version: 14

    - name: install meteor
      run: npm i -g meteor 

    - name: add meteor to the path for linux
      if: matrix.platform == 'ubuntu-latest'
      run:  |
        echo "${HOME}/.meteor" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "${HOME}/.meteor" >> $GITHUB_PATH
      shell: bash

    - name: add meteor to the path for macos
      if: matrix.platform == 'macos-latest'
      run:  |
        echo "${HOME}/.meteor" >> $GITHUB_PATH
      shell: bash

    - name: add meteor to the path for windows
      if: matrix.platform == 'windows-latest'
      run:  |
        echo "${HOME}/.meteor" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: install Rust stable
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable

    - name: install dependencies (ubuntu only)
      if: matrix.platform == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev webkit2gtk-4.0 libappindicator3-dev librsvg2-dev patchelf

    - name: install app dependencies and build it
      run: npm install

    - uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      with:
        tagName: plankton-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version
        releaseName: "Plankton v__VERSION__"
        releaseBody: "See the assets to download this version and install."
        releaseDraft: true
        prerelease: false